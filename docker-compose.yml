version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: qwenta-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: qwenta
      POSTGRES_USER: qwenta
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qwenta"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: qwenta-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    # GPU support (uncomment if you have NVIDIA GPU):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  app:
    build: .
    container_name: qwenta-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://qwenta:${DB_PASSWORD:-changeme123}@postgres:5432/qwenta
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5
      SESSION_SECRET: ${SESSION_SECRET:-change-this-in-production-min-32-chars}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:4321}
    ports:
      - "4321:4321"

volumes:
  postgres_data:
  ollama_data:
